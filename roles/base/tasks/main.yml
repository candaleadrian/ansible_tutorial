- name: add ssh key for simone
  authorized_key:
    user: simone
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIC6Pb+qQV/RZwVYKBxQNkTPQ9OLf+/LFBpuQ4jsBpCGZ ansible"

- name: generate sshd_config file from template
  tags: ssh
  template:
    src: "{{ sshd_template_file }}"
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: 0644
  notify: restart_sshd
